services:

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama    # persists downloaded models across restarts
    environment:
      - OLLAMA_KEEP_ALIVE=-1         # never unload model from VRAM between requests
    restart: unless-stopped
    # GPU passthrough — requires nvidia-container-toolkit installed on the HOST (not inside Docker).
    # Install guide: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
    # After installing on host, uncomment the block below and run: docker compose up -d --build
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          cpus: "6"                  # adjust to (your_total_cores - 2) to leave headroom for OS

  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json:ro
      - huggingface_cache:/root/.cache/huggingface   # persists embedding model weights
    environment:
      - OPENAI_AGENTS_DISABLE_TRACING=1
    depends_on:
      - ollama
    restart: unless-stopped
    develop:
      watch:
        - action: sync+restart
          path: .
          target: /app
          ignore:
            - data/
            - __pycache__/
            - "**/__pycache__"
            - "*.pyc"
    deploy:
      resources:
        limits:
          cpus: "2"                  # app is I/O-bound; 2 cores is plenty

volumes:
  ollama_data:
  huggingface_cache: